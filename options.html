<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tab Timer — Settings</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0e1016;
        color: #e5e7eb;
      }
      .card {
        max-width: 520px;
        margin: 0 auto;
        padding: 28px 24px 40px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #a5b4fc;
      }
      .brand::before {
        content: '';
        width: 12px;
        height: 12px;
        border-radius: 3px;
        background: linear-gradient(135deg, #6366f1, #4338ca);
      }
      h1 {
        font-size: 20px;
        margin: 10px 0 6px;
      }
      .intro {
        color: #9aa0ad;
        font-size: 13px;
        line-height: 1.5;
        margin: 0 0 18px;
      }
      h2 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #c7c9d1;
        margin: 22px 0 8px;
      }
      .btn {
        border: 0;
        border-radius: 8px;
        padding: 9px 14px;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        background: #6366f1;
        color: #fff;
      }
      .btn:hover {
        background: #4f46e5;
      }
      .btn:focus-visible {
        outline: 2px solid #a5b4fc;
        outline-offset: 2px;
      }
      .list {
        list-style: none;
        margin: 0;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        overflow: hidden;
      }
      .item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
      .item:first-child {
        border-top: 0;
      }
      .left {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .name {
        font-size: 14px;
        font-weight: 500;
      }
      .host {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        color: #9aa0ad;
      }
      .toggle {
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        padding: 5px 12px;
        font: inherit;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        background: transparent;
        color: #e5e7eb;
        white-space: nowrap;
      }
      .toggle:hover {
        border-color: rgba(255, 255, 255, 0.3);
      }
      .toggle.on {
        background: rgba(99, 102, 241, 0.25);
        border-color: #6366f1;
        color: #c7d2fe;
      }
      .toggle:focus-visible {
        outline: 2px solid #a5b4fc;
        outline-offset: 2px;
      }
      .addrow {
        display: flex;
        gap: 8px;
      }
      .addrow input {
        flex: 1;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        padding: 9px 12px;
        font: inherit;
        font-size: 13px;
        background: #161922;
        color: #e5e7eb;
      }
      .addrow input:focus-visible {
        outline: 2px solid #a5b4fc;
        outline-offset: 0;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand" data-i18n="overlayLabel">Tab Timer</div>
      <h1 data-i18n="optionsTitle">Settings</h1>
      <p class="intro" data-i18n="optionsIntro">
        Tab Timer only tracks time on sites you enable here, and everything stays on your device — nothing is ever sent
        off your browser.
      </p>

      <button id="enable-suggested" type="button" class="btn" data-i18n="optionsEnableAll">
        Enable all suggested sites
      </button>

      <h2 data-i18n="optionsSuggested">Suggested</h2>
      <ul id="suggested" class="list"></ul>

      <h2 data-i18n="optionsAddHeading">Add a site</h2>
      <form id="add-form" class="addrow">
        <input
          id="add-input"
          type="text"
          placeholder="example.com"
          aria-label="Site to track"
          data-i18n-attr="placeholder=optionsAddPlaceholder;aria-label=optionsAddAria"
        />
        <button class="btn" type="submit" data-i18n="optionsAddButton">Add</button>
      </form>

      <h2 id="custom-h" hidden data-i18n="optionsYourSites">Your sites</h2>
      <ul id="custom" class="list"></ul>
    </main>
    <script type="module" src="/src/options.ts"></script>
  </body>
</html>
