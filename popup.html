<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tab Timer</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
      }
      body {
        width: 264px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #0e1016;
        color: #e5e7eb;
      }
      .card {
        padding: 14px 16px 12px;
      }
      .brand {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
        color: #8a8a8a;
        margin-bottom: 12px;
      }
      .site {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        color: #9aa0ad;
        margin-bottom: 6px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .metric {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .metric-label {
        font-size: 12px;
        color: #c7c9d1;
      }
      .metric-value {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 24px;
        font-weight: 700;
        color: #fff;
        font-variant-numeric: tabular-nums;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      .btn {
        flex: 1;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 2px;
        padding: 7px 10px;
        font: inherit;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.08);
        color: #f5f5f5;
      }
      .btn:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      .btn.ghost {
        background: transparent;
        color: #c7c9d1;
      }
      .btn.ghost:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .btn:focus-visible {
        outline: 1px solid #9a9a9a;
        outline-offset: 2px;
      }
      .empty {
        font-size: 13px;
        color: #9aa0ad;
        margin: 6px 0 12px;
      }
      .link {
        display: block;
        width: 100%;
        margin-top: 10px;
        padding: 6px;
        border: 0;
        background: transparent;
        color: #9aa0ad;
        font: inherit;
        font-size: 12px;
        text-align: center;
        cursor: pointer;
        border-radius: 6px;
      }
      .link:hover {
        color: #e5e7eb;
        background: rgba(255, 255, 255, 0.06);
      }
      .link:focus-visible {
        outline: 1px solid #9a9a9a;
        outline-offset: 1px;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand" data-i18n="overlayLabel">Tab Timer</div>

      <section id="tracked" hidden>
        <div class="site" id="site"></div>
        <div class="metric">
          <span class="metric-label" data-i18n="labelToday" data-i18n-attr="title=tooltipToday">Today</span>
          <span class="metric-value" id="today">00:00:00</span>
        </div>
        <div class="actions">
          <button id="reset-btn" type="button" class="btn" data-i18n="popupResetToday">Reset today</button>
          <button id="toggle-btn" type="button" class="btn ghost" data-i18n="popupHideOverlay">Hide overlay</button>
        </div>
      </section>

      <section id="enable" hidden>
        <div class="site" id="enable-site"></div>
        <p class="empty" data-i18n="popupNotTracking">Tab Timer isn't tracking this site yet.</p>
        <div class="actions">
          <button id="enable-btn" type="button" class="btn" data-i18n="popupEnableSite">Enable on this site</button>
        </div>
      </section>

      <section id="untracked" hidden>
        <p class="empty" data-i18n="popupCantTrack">Tab Timer can't track this page.</p>
      </section>

      <p id="loading" class="empty" data-i18n="popupLoading">Loading…</p>

      <button id="manage-btn" type="button" class="link" data-i18n="popupManage">Manage sites…</button>
    </main>
    <script type="module" src="/src/popup.ts"></script>
  </body>
</html>
