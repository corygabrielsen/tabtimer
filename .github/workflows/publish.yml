name: Publish to Chrome Web Store

# Manual-only for now: trigger from the Actions tab. Builds the extension,
# packages dist/, and uploads + publishes it via the Chrome Web Store API.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.1.0). Blank = version in package.json.'
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: chrome-web-store-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version
        id: version
        run: |
          version="${{ inputs.version }}"
          if [ -z "$version" ]; then
            version="$(jq -r .version package.json)"
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing version $version"

      - name: Set package version
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          # package.json is the source of truth; the build stamps it onto the
          # manifest (see vite.config.ts).
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version=process.env.VERSION;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"

      - name: Typecheck and lint
        run: |
          pnpm run typecheck
          pnpm run lint

      - name: Package
        run: |
          pnpm package
          unzip -l tabtimer.zip

      - name: Upload and publish
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
          CWS_EXTENSION_ID: ${{ vars.CWS_EXTENSION_ID }}
          ZIP_PATH: tabtimer.zip
        run: ./scripts/publish-chrome-web-store.sh
